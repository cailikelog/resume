name: Build Resume

on:
  push:
    tags:
      - 'main-*'
      - 'special-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release type and find tex files
        id: setup
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          if [[ "$GITHUB_REF" == refs/tags/main-* ]]; then
            echo "make_latest=true" >> $GITHUB_OUTPUT
            echo "title_prefix=简历" >> $GITHUB_OUTPUT
            FILES=""
            for f in *-main-cn.tex *-main-en.tex; do
              [ -f "$f" ] && FILES="${FILES}${f}"$'\n'
            done
          elif [[ "$GITHUB_REF" == refs/tags/special-* ]]; then
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "title_prefix=简历（定制版）" >> $GITHUB_OUTPUT
            FILES=""
            for f in *.tex; do
              [[ "$f" != *-main-* ]] && FILES="${FILES}${f}"$'\n'
            done
          else
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "title_prefix=简历（调试）" >> $GITHUB_OUTPUT
            FILES=""
          fi

          if [ -z "$FILES" ]; then
            echo "::error::No tex files found for this tag type."
            exit 1
          fi

          echo "tex_files<<EOF" >> $GITHUB_OUTPUT
          printf '%s' "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Compile resumes
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ steps.setup.outputs.tex_files }}
          latexmk_use_xelatex: true
          pre_compile: |
            apk add --no-cache font-noto-cjk

      - name: Rename PDFs
        run: |
          for pdf in *.pdf; do
            [ -f "$pdf" ] || continue
            base="${pdf%.pdf}"
            lang="${base##*-}"
            LANG_UPPER=$(echo "$lang" | tr '[:lower:]' '[:upper:]')
            note_part="${base%-*}"
            note="${note_part#*-}"
            if [ "$note" = "main" ]; then
              new_name="LikeCAI-Resume-${LANG_UPPER}.pdf"
            else
              new_name="LikeCAI-Resume-${note}-${LANG_UPPER}.pdf"
            fi
            echo "Renaming $pdf -> $new_name"
            mv "$pdf" "$new_name"
          done

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.setup.outputs.tag_name }}
          name: ${{ steps.setup.outputs.title_prefix }} ${{ steps.setup.outputs.tag_name }}
          make_latest: ${{ steps.setup.outputs.make_latest }}
          files: LikeCAI-Resume-*.pdf
          fail_on_unmatched_files: false
          generate_release_notes: true
