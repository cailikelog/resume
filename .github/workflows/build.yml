name: Build Resume

on:
  push:
    tags:
      - 'v*'
      - 'company-*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine release type
        id: release_type
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "make_latest=true" >> $GITHUB_OUTPUT
            echo "title_prefix=简历" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/company-* ]]; then
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "title_prefix=简历（定制版）" >> $GITHUB_OUTPUT
          else
            echo "make_latest=false" >> $GITHUB_OUTPUT
            echo "title_prefix=简历（调试）" >> $GITHUB_OUTPUT
          fi

      - name: Check which source files exist
        id: check_files
        run: |
          CN_EXISTS=false
          EN_EXISTS=false
          if [ -f "2026Sp-main-cn.tex" ]; then
            CN_EXISTS=true
          fi
          if [ -f "2026Sp-main-en.tex" ]; then
            EN_EXISTS=true
          fi
          echo "cn_exists=$CN_EXISTS" >> $GITHUB_OUTPUT
          echo "en_exists=$EN_EXISTS" >> $GITHUB_OUTPUT
          if [ "$CN_EXISTS" = "false" ] && [ "$EN_EXISTS" = "false" ]; then
            echo "::error::No resume source files found."
            exit 1
          fi

      - name: Compile Chinese resume
        if: steps.check_files.outputs.cn_exists == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026Sp-main-cn.tex
          latexmk_use_xelatex: true
          pre_compile: |
            apk add --no-cache font-noto-cjk

      - name: Rename Chinese PDF
        if: steps.check_files.outputs.cn_exists == 'true'
        run: mv 2026Sp-main-cn.pdf 蔡礼珂-简历.pdf

      - name: Compile English resume
        if: steps.check_files.outputs.en_exists == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 2026Sp-main-en.tex
          latexmk_use_xelatex: true
          pre_compile: |
            apk add --no-cache font-noto-cjk

      - name: Rename English PDF
        if: steps.check_files.outputs.en_exists == 'true'
        run: mv 2026Sp-main-en.pdf LikeCAI-resume.pdf

      - name: Collect artifacts
        id: collect
        run: |
          FILES=""
          if [ -f "蔡礼珂-简历.pdf" ]; then
            FILES="$FILES 蔡礼珂-简历.pdf"
          fi
          if [ -f "LikeCAI-resume.pdf" ]; then
            FILES="$FILES LikeCAI-resume.pdf"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_type.outputs.tag_name }}
          name: ${{ steps.release_type.outputs.title_prefix }} ${{ steps.release_type.outputs.tag_name }}
          make_latest: ${{ steps.release_type.outputs.make_latest }}
          files: |
            蔡礼珂-简历.pdf
            LikeCAI-resume.pdf
          fail_on_unmatched_files: false
          generate_release_notes: true